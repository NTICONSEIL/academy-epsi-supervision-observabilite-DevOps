global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: app-sample
    static_configs:
      - targets: [app-sample:8080]
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
