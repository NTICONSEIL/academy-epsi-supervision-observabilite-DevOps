version: "3.8"

# ============================================================
# BOTE848 — TP Séance 2 : ELK vs Loki vs Prometheus
# ShopFlow — incident du 14/11/2024
#
# Services :
#   PARTIE A — ELK (Elasticsearch + Kibana + injecteur)
#     - elasticsearch : moteur d'indexation full-text
#     - kibana        : interface de visualisation ELK
#     - elk-injector  : injecte shopflow.log dans ES au démarrage
#
#   PARTIE B — Loki (Loki + Promtail)
#     - loki          : moteur de logs label-based
#     - promtail      : agent de collecte vers Loki
#
#   PARTIE C — Prometheus (app-sample + traffic-generator + Prometheus + node-exporter)
#     - app-sample        : application ShopFlow simulée, expose /metrics
#     - traffic-generator : génère du trafic continu sur app-sample
#     - prometheus        : scrape les métriques toutes les 15s
#     - node-exporter     : métriques machine hôte (CPU, RAM, disque)
#
#   COMMUN — Grafana (multi-datasource : Loki + Prometheus)
#     - grafana       : interface unifiée, port 3000
#                       datasources : Loki (partie B) et Prometheus (partie C)
#
# Démarrage :
#   Partie A seule      : docker compose --profile elk up -d
#   Partie B seule      : docker compose --profile loki up -d
#   Partie C seule      : docker compose --profile prometheus up -d
#   B + C (+ Grafana)   : docker compose --profile loki --profile prometheus up -d
#   Tout                : docker compose --profile elk --profile loki --profile prometheus up -d
#
# Grafana est lancé dès que le profil loki OU prometheus est actif.
# ============================================================

networks:
  shopflow-net:
    driver: bridge

volumes:
  elasticsearch-data:
  loki-data:
  prometheus-data:

services:

  # ----------------------------------------------------------
  # PARTIE A — ELK
  # ----------------------------------------------------------

  elasticsearch:
    image: elasticsearch:8.13.0
    profiles: [elk]
    container_name: shopflow-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - shopflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 20

  kibana:
    image: kibana:8.13.0
    profiles: [elk]
    container_name: shopflow-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - shopflow-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  elk-injector:
    image: python:3.11-alpine
    profiles: [elk]
    container_name: shopflow-elk-injector
    volumes:
      - ./elk/inject_logs.py:/inject_logs.py:ro
      - ./logs/shopflow.log:/logs/shopflow.log:ro
    command: python /inject_logs.py
    networks:
      - shopflow-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: on-failure

  # ----------------------------------------------------------
  # PARTIE B — Loki
  # ----------------------------------------------------------

  loki:
    image: grafana/loki:3.0.0
    profiles: [loki]
    container_name: shopflow-loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - shopflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  promtail:
    image: grafana/promtail:3.0.0
    profiles: [loki]
    container_name: shopflow-promtail
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs/shopflow.log:/logs/shopflow.log:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - shopflow-net
    depends_on:
      loki:
        condition: service_healthy

  # ----------------------------------------------------------
  # PARTIE C — Prometheus
  # ----------------------------------------------------------

  app-sample:
    image: node:18-alpine
    profiles: [prometheus]
    container_name: shopflow-app-sample
    working_dir: /app
    volumes:
      - ./app-sample:/app        # sans :ro — Node.js doit pouvoir écrire dans /app
    command: node app.js         # pas de npm install : aucune dépendance externe
    ports:
      - "8080:8080"
    networks:
      - shopflow-net
    environment:
      - PORT=8080
      - INCIDENT_MODE=false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  traffic-generator:
    image: node:18-alpine
    profiles: [prometheus]
    container_name: shopflow-traffic-generator
    volumes:
      - ./app-sample/traffic.js:/traffic.js:ro
    command: node /traffic.js    # pas de npm install : utilise uniquement http natif
    networks:
      - shopflow-net
    environment:
      - TARGET_URL=http://app-sample:8080
    depends_on:
      app-sample:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: [prometheus]
    container_name: shopflow-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - shopflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy | grep -q Healthy"]
      interval: 10s
      timeout: 5s
      retries: 10

  node-exporter:
    image: prom/node-exporter:v1.7.0
    profiles: [prometheus]
    container_name: shopflow-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"
    networks:
      - shopflow-net

  # ----------------------------------------------------------
  # COMMUN — Grafana (loki OU prometheus)
  # Actif dès que l'un des deux profils est lancé.
  # ----------------------------------------------------------

  grafana:
    image: grafana/grafana:11.0.0
    profiles: [loki, prometheus]
    container_name: shopflow-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - shopflow-net
