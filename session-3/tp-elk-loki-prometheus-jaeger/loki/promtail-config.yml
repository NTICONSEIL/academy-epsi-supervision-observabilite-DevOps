server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: shopflow
    static_configs:
      - targets:
          - localhost
        labels:
          job: shopflow
          env: prod
          __path__: /logs/shopflow.log

    pipeline_stages:
      - json:
          expressions:
            level:      level
            service:    service
            instance:   instance
            error_code: error_code
            user_id:    user_id
            trace_id:   trace_id

      - labels:
          level:
          service:
          instance:
          error_code:
