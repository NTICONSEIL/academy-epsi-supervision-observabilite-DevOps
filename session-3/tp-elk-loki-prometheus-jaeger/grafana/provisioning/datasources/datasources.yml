apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki-shopflow
    url: http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 1000

  - name: Prometheus
    type: prometheus
    uid: prometheus-shopflow
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 15s
      queryTimeout: 60s
